            align-items: center;
            overflow: hidden;

        .campo {
            width: 95%;
            max-width: 800px;
            height: 95vh;
            background: #228B22;
            position: relative;
            border: 8px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .linha-meio {
            position: absolute;
            top: 0; left: 50%;
            width: 5px; height: 100%;
            background: #fff;
        }
        .circulo-meio {
            position: absolute;
            top: 50%; left: 50%;
            width: 100px; height: 100px;
            border: 5px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .area {
            position: absolute;
            bottom: 0; right: 0;
            width: 150px; height: 200px;
            border: 5px solid #fff;
            border-bottom: none;
        }
        .area.esq { left: 0; transform: scaleX(-1); }
        .jogador {
            position: absolute;
            bottom: 20%; left: 25%;
            width: 100px; height: 140px;
            z-index: 10;
            transition: transform 0.2s;
        }
        .jogador.chutando { transform: rotate(-15deg); }
        .cabeca {
            width: 35px; height: 35px;
            background: #FFD700;
            border-radius: 50%;
            margin: 0 auto;
            border: 2px solid #000;
        }
        .corpo {
            width: 45px; height: 50px;
            background: #FFD700;
            margin: 0 auto;
            border: 2px solid #000;
            border-top: none;
        }
        .braco {
            width: 12px; height: 40px;
            background: #009933;
            position: absolute;
            top: 40px;
            border: 2px solid #000;
        }
        .braco.esq { left: 15px; transform: rotate(-20deg); }
        .braco.dir { right: 15px; transform: rotate(20deg); }
        .perna {
            width: 15px; height: 45px;
            background: #000;
            position: absolute;
            bottom: 0;
            border: 2px solid #000;
        }
        .perna.esq { left: 20px; }
        .perna.dir { right: 20px; }
        .goleiro {
            position: absolute;
            bottom: 35%; right: 22%;
            width: 70px; height: 90px;
        }
        .goleiro .corpo { background: #fff; }
        .trave {
            position: absolute;
            bottom: 35%; right: 12%;
            width: 120px; height: 80px;
            border: 6px solid #fff;
            border-bottom: none;
        }
        .trave:after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            width: 6px; height: 100%;
            background: #fff;
        }
        .bola {
            position: absolute;
            bottom: 38%; left: 35%;
            width: 25px; height: 25px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #000;
            display: none;
            z-index: 15;
        }
        .bola.voando {
            animation: voar 1s forwards;
        }
        @keyframes voar {
            0% { bottom: 38%; left: 35%; }
            100% { bottom: 55%; right: 20%; }
        }
        .gol-texto {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            font-weight: bold;
            color: yellow;
            text-shadow: 4px 4px 0px blue, -4px -4px 0px blue, 4px -4px 0px blue, -4px 4px 0px blue;
            display: none;
            z-index: 50;
            animation: piscar 0.3s infinite;
        }
        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .painel {
            position: absolute;
            top: 10px; left: 0;
            width: 100%;
            z-index: 20;
            text-align: center;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .placar {
            display: flex;
            justify-content: space-around;
            font-size: 18px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 2px #000;
        }
        .caixa-pergunta {
            position: absolute;
            top: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            width: 85%;
            border: 3px solid #FFD700;
            z-index: 20;
        }
        .botoes-resposta {
            position: absolute;
            bottom: 80px; left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
            z-index: 20;
        }
        .botao {
            padding: 12px;
            font-size: 16px;
            background: #0044cc;
            color: white;
            border: none;
            border-radius: 8px;
            border: 2px solid #fff;
            cursor: pointer;
        }
        .botao.correta { background: green; }
        .botao.errada { background: red; }
        .btn-acao {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 20px;
            background: #FFD700;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
        }
        .tela-inicial {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .input-nome {
            padding: 15px;
            font-size: 18px;
            width: 80%;
            margin: 10px 0;
            text-align: center;
            border-radius: 10px;
            border: 3px solid #FFD700;
            background: #333;
            color: white;
        }
        .times {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }
        .btn-time {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .azul { background: blue; color: white; }
        .vermelho { background: red; color: white; }
        .lista {
            background: #222;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            width: 80%;
            text-align: left;
        }
        .btn-iniciar {
            padding: 15px 50px;
            font-size: 22px;
            background: gray;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-iniciar.ativo {

            cursor: pointer;
        }
        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
