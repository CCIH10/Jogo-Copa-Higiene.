<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa da Higiene - CCIH</title>
    <style>
        /* ESTILO COM O CAMPO E OS BONECOS GRANDES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #228B22 70%, #228B22 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .campo {
            width: 100%;
            height: 100%;
            position: relative;
            background-image: 
                linear-gradient(to right, transparent 48%, #fff 48%, #fff 52%, transparent 52%),
                radial-gradient(circle, transparent 60%, #fff 60%, #fff 62%, transparent 62%);
            border: 5px solid #fff;
        }

        /* JOGADOR BONECO GRANDE */
        .jogador {
            position: absolute;
            bottom: 15%;
            left: 15%;
            width: 120px;
            height: 180px;
            transition: transform 0.2s;
        }
        .jogador.chutando {
            transform: rotate(-10deg);
        }
        .cabeca {
            width: 40px;
            height: 40px;
            background: #FFD700; /* camisa amarela Brasil */
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid #000;
        }
        .corpo {
            width: 50px;
            height: 60px;
            background: #FFD700;
            margin: 0 auto;
            border: 3px solid #000;
            border-top: none;
        }
        .braco {
            width: 15px;
            height: 50px;
            background: #009933;
            position: absolute;
            top: 45px;
        }
        .braco.esq { left: 10px; transform: rotate(-30deg); }
        .braco.dir { right: 10px; transform: rotate(30deg); }
        .perna {
            width: 18px;
            height: 60px;
            background: #000;
            position: absolute;
            bottom: 0;
        }
        .perna.esq { left: 15px; }
        .perna.dir { right: 15px; }

        /* GOLEIRO */
        .goleiro {
            position: absolute;
            bottom: 25%;
            right: 20%;
            width: 80px;
            height: 100px;
        }
        .goleiro .corpo { background: #fff; }

        /* TRAVE */
        .trave {
            position: absolute;
            bottom: 25%;
            right: 10%;
            width: 150px;
            height: 100px;
            border: 8px solid #fff;
            border-bottom: none;
        }
        .trave:after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 8px;
            height: 100%;
            background: #fff;
        }

        /* BOLA */
        .bola {
            position: absolute;
            bottom: 40%;
            left: 30%;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #000;
            display: none;
            z-index: 10;
        }
        .bola.chute {
            animation: irParaGol 1s forwards;
        }

        @keyframes irParaGol {
            0% { bottom: 40%; left: 30%; }
            100% { bottom: 50%; right: 15%; }
        }

        /* PLACAR E TEXTO */
        .info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px #000;
            z-index: 20;
        }
        .placar {
            display: flex;
            justify-content: space-around;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .pergunta {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            margin: 10px auto;
            width: 80%;
            border-radius: 10px;
            font-size: 18px;
        }
        .botoes {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 20;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: #009933;
            color: white;
            cursor: pointer;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.5);
        }
        button:hover { background: #00cc44; }

        .gol-animacao {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: yellow;
            text-shadow: 5px 5px 10px black;
            display: none;
            z-index: 30;
            animation: piscar 0.5s infinite;
        }

        @keyframes piscar {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="campo">
    <!-- ANIMAÇÃO DO GOL -->
    <div class="gol-animacao" id="golTexto">GOOOOOLL!!!</div>

    <!-- CAMPO E JOGADORES -->
    <div class="jogador" id="jogador">
        <div class="cabeca"></div>
        <div class="corpo"></div>
        <div class="braco esq"></div>
        <div class="braco dir"></div>
        <div class="perna esq"></div>
        <div class="perna dir"></div>
    </div>

    <div class="goleiro">
        <div class="cabeca"></div>
        <div class="corpo" style="background: #fff;"></div>
        <div class="braco esq"></div>
        <div class="braco dir"></div>
    </div>

    <div class="trave"></div>
    <div class="bola" id="bola"></div>

    <!-- PARTE DO JOGO -->
    <div class="info">
        <h1>⚽ COPA DA HIGIENE - CCIH 🧼</h1>
        <div class="placar">
            <div>🔵 AZUL: <span id="pontosAzul">0</span></div>
            <div>⏱️ <span id="timer">00:00</span></div>
            <div>🔴 VERMELHO: <span id="pontosVermel">0</span></div>
        </div>
        <div class="pergunta" id="perguntaTexto">Clique em "Sortear" para começar!</div>
    </div>

    <div class="botoes">
        <button id="btnSortear">🎲 SORTEAR PERGUNTA</button>
        <button id="btnGol">⚽ MARCAR GOL!</button>
    </div>
</div>

<script>
    // EFEITO DO CHUTE E GOL
    const jogador = document.getElementById('jogador');
    const bola = document.getElementById('bola');
    const golTexto = document.getElementById('golTexto');
    const btnGol = document.getElementById('btnGol');

    btnGol.addEventListener('click', () => {
        // Jogador chuta
        jogador.classList.add('chutando');
        
        // Bola sai
        bola.style.display = 'block';
        bola.classList.remove('chute');
        void bola.offsetWidth; // Reinicia animação
        bola.classList.add('chute');

        // Mostra GOL depois de 1 segundo
        setTimeout(() => {
            golTexto.style.display = 'block';
            setTimeout(() => {
                golTexto.style.display = 'none';
            }, 2000);
        }, 800);

        // Volta ao normal
        setTimeout(() => {
            jogador.classList.remove('chutando');
            bola.style.display = 'none';
        }, 1500);
    });

    // --- AQUI VAI O RESTO DO SEU CÓDIGO DO JOGO ---
    // (Perguntas, placar, tempo, etc)
</script>

</body>
</html>
