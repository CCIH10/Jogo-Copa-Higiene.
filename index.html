<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Copa da Higiene</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #0a0, #000);
    color: white;
    text-align: center;
}

button {
    padding: 12px;
    margin: 5px;
    font-size: 18px;
    cursor: pointer;
}

/* INICIO */
#inicio { padding: 20px; }

.azul { background: blue; }
.vermelho { background: red; }

#iniciar {
    background: gray;
}
#iniciar.ativo {
    background: yellow;
    animation: piscar 1s infinite;
}

@keyframes piscar {
    50% {opacity:0.5;}
}

/* JOGO */
#jogo { display:none; }

#placar {
    font-size: 22px;
    margin: 10px;
}

#campo {
    height: 250px;
    background: green;
    position: relative;
}

#bola {
    position: absolute;
    bottom: 60px;
    left: 48%;
    font-size: 30px;
    transition: 0.7s;
}

.chute {
    transform: translate(-150px,-180px);
}

#gol {
    font-size: 45px;
    color: yellow;
    display:none;
}

.resposta {
    display:block;
    margin: 5px auto;
    width: 80%;
    background:white;
    color:black;
}
</style>
</head>

<body>

<h1>🏆 COPA DA HIGIENE</h1>

<div id="inicio">
<input id="nome" placeholder="Nome">

<br><br>

<button class="azul" onclick="entrar('azul')">🔵 Azul</button>
<button class="vermelho" onclick="entrar('vermelho')">🔴 Vermelho</button>

<h3>Azul</h3>
<ul id="azul"></ul>

<h3>Vermelho</h3>
<ul id="vermelho"></ul>

<button id="iniciar" onclick="start()">AGUARDANDO...</button>
</div>

<div id="jogo">

<div id="placar">
🔵 <span id="pA">0</span> | 🔴 <span id="pV">0</span>
</div>

<div id="campo">
<div id="bola">⚽</div>
</div>

<div id="gol">GOOOOOL!!!</div>

<h2 id="pergunta"></h2>

<button class="resposta" onclick="resp(0)"></button>
<button class="resposta" onclick="resp(1)"></button>
<button class="resposta" onclick="resp(2)"></button>
<button class="resposta" onclick="resp(3)"></button>

<button onclick="sortear()">SORTEAR</button>

</div>

<script>
let azul=[], vermelho=[];
let pA=0,pV=0;
let atual, time;

let perguntas=[
{p:"Forma correta?",r:["Água","Água+álcool","Papel","Nada"],c:1},
{p:"Tempo?",r:["20s","5s","5min","10s"],c:0}
];

function entrar(t){
let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

if(t==="azul") azul.push(nome);
else vermelho.push(nome);

document.getElementById("azul").innerHTML=azul.map(n=>"<li>"+n+"</li>").join("");
document.getElementById("vermelho").innerHTML=vermelho.map(n=>"<li>"+n+"</li>").join("");

if(azul.length && vermelho.length){
let b=document.getElementById("iniciar");
b.classList.add("ativo");
b.innerText="INICIAR";
}
}

function start(){
document.getElementById("inicio").style.display="none";
document.getElementById("jogo").style.display="block";
}

function sortear(){
let q=perguntas[Math.floor(Math.random()*perguntas.length)];
atual=q;

document.getElementById("pergunta").innerText=q.p;

let btns=document.getElementsByClassName("resposta");
q.r.forEach((r,i)=>btns[i].innerText=r);

time=Math.random()>0.5?"azul":"vermelho";
let lista=time==="azul"?azul:vermelho;
let jogador=lista[Math.floor(Math.random()*lista.length)];

alert("Vez de: "+jogador);
}

function resp(i){
if(i===atual.c){
gol();

if(time==="azul"){
pA++; document.getElementById("pA").innerText=pA;
}else{
pV++; document.getElementById("pV").innerText=pV;
}
}else{
alert("Errou!");
}
}

function gol(){
let b=document.getElementById("bola");
b.classList.add("chute");

let g=document.getElementById("gol");
g.style.display="block";

setTimeout(()=>{
b.classList.remove("chute");
g.style.display="none";
},1500);
}
</script>

</body>
</html>
