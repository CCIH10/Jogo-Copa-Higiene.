<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Copa da Higiene</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    background: linear-gradient(#0a0,#000);
}

/* INICIO */
#inicio { padding:20px; }

button {
    padding:12px;
    font-size:18px;
    margin:5px;
    cursor:pointer;
}

.azul { background:#0066ff; color:white; }
.vermelho { background:#ff0000; color:white; }

#iniciar {
    background:gray;
}
#iniciar.ativo {
    background:yellow;
    animation:pulse 1s infinite;
}

@keyframes pulse {
    50% { transform:scale(1.1); }
}

/* JOGO */
#jogo { display:none; }

#placar {
    font-size:24px;
    margin:10px;
}

/* CAMPO */
#campo {
    height:300px;
    background: repeating-linear-gradient(
        90deg,
        #0a0,
        #0a0 40px,
        #0c0 40px,
        #0c0 80px
    );
    position:relative;
    border-top:3px solid white;
}

/* ELEMENTOS */
#jogador {
    position:absolute;
    bottom:20px;
    left:45%;
    font-size:60px;
}

#goleiro {
    position:absolute;
    top:10px;
    left:45%;
    font-size:60px;
    transition:0.5s;
}

#bola {
    position:absolute;
    bottom:80px;
    left:48%;
    font-size:30px;
    transition:1s;
}

/* ANIMAÇÕES */
.chutar {
    transform:translateY(-200px) translateX(-80px);
}

.defesa {
    transform:translateX(-60px);
}

#gol {
    font-size:50px;
    color:yellow;
    display:none;
    animation:piscar 0.5s infinite;
}

@keyframes piscar {
    50% { opacity:0.3; }
}

/* PERGUNTAS */
.resposta {
    display:block;
    width:80%;
    margin:5px auto;
    background:white;
    color:black;
}
</style>
</head>

<body>

<audio id="musica" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="golSom">
<source src="https://www.myinstants.com/media/sounds/gol.mp3">
</audio>

<h1>🏆 COPA DA HIGIENE</h1>

<div id="inicio">
<input id="nome" placeholder="Seu nome"><br><br>

<button class="azul" onclick="entrar('azul')">🔵 Azul</button>
<button class="vermelho" onclick="entrar('vermelho')">🔴 Vermelho</button>

<h3>Azul</h3>
<ul id="azul"></ul>

<h3>Vermelho</h3>
<ul id="vermelho"></ul>

<button id="iniciar" onclick="start()">AGUARDANDO...</button>
</div>

<div id="jogo">

<div id="placar">
🔵 <span id="pA">0</span> ⚽ 🔴 <span id="pV">0</span>
</div>

<div id="campo">
<div id="jogador">🧍‍♂️</div>
<div id="bola">⚽</div>
<div id="goleiro">🧤</div>
</div>

<div id="gol">GOOOOOLLL!!!</div>

<h2 id="pergunta"></h2>

<button class="resposta" onclick="resp(0)"></button>
<button class="resposta" onclick="resp(1)"></button>
<button class="resposta" onclick="resp(2)"></button>
<button class="resposta" onclick="resp(3)"></button>

<button onclick="sortear()">SORTEAR</button>

</div>

<script>

let azul=[], vermelho=[];
let pA=0,pV=0;
let atual, time;

let perguntas=[
{p:"Forma correta de higienizar?",r:["Água","Água + sabão ou álcool","Papel","Nada"],c:1},
{p:"Tempo ideal?",r:["20-30s","5s","5min","10s"],c:0},
{p:"Não fazer?",r:["Jaleco","Chinelo","Crachá","Lavar"],c:1}
];

function entrar(t){
let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

if(t==="azul") azul.push(nome);
else vermelho.push(nome);

document.getElementById("azul").innerHTML=azul.map(n=>"<li>"+n+"</li>").join("");
document.getElementById("vermelho").innerHTML=vermelho.map(n=>"<li>"+n+"</li>").join("");

if(azul.length && vermelho.length){
let b=document.getElementById("iniciar");
b.classList.add("ativo");
b.innerText="INICIAR JOGO";
}
}

function start(){
document.getElementById("inicio").style.display="none";
document.getElementById("jogo").style.display="block";

document.getElementById("musica").play();
}

function sortear(){
let q=perguntas[Math.floor(Math.random()*perguntas.length)];
atual=q;

document.getElementById("pergunta").innerText=q.p;

let btns=document.getElementsByClassName("resposta");
q.r.forEach((r,i)=>btns[i].innerText=r);

time=Math.random()>0.5?"azul":"vermelho";
let lista=time==="azul"?azul:vermelho;
let jogador=lista[Math.floor(Math.random()*lista.length)];

alert("⚽ Vez de: "+jogador);
}

function resp(i){

let bola=document.getElementById("bola");
let goleiro=document.getElementById("goleiro");

if(i===atual.c){

document.getElementById("golSom").play();

bola.classList.add("chutar");

setTimeout(()=>{
document.getElementById("gol").style.display="block";
},500);

if(time==="azul"){
pA++; document.getElementById("pA").innerText=pA;
}else{
pV++; document.getElementById("pV").innerText=pV;
}

}else{

goleiro.classList.add("defesa");

setTimeout(()=>{
goleiro.classList.remove("defesa");
},500);

alert("Defendeu! ❌");
}

setTimeout(()=>{
bola.classList.remove("chutar");
document.getElementById("gol").style.display="none";
},1500);

}

</script>

</body>
</html>
